# ============================================================================
# SOURCE OF TRUTH for the keyd keyboard remap. THIS FILE IS NOT LOADED BY keyd.
#
# keyd 2.5+ reads ONLY /etc/keyd/*.conf — it does not look at ~/.config/keyd/.
# This copy lives in the dotfiles repo so the config + its rationale survive a
# reinstall. Deploy / re-deploy after editing:
#
#     sudo cp ~/.config/keyd/default.conf /etc/keyd/default.conf
#     sudo systemctl restart keyd
#
# After editing /etc/keyd/default.conf in place, copy it BACK here and commit,
# or the two drift. See the "Keyboard remapping (keyd)" section in [CLAUDE.md](../../CLAUDE.md)
# for the full physical->logical key map, rationale, rollback, and the
# /usr/local/bin/fcitx5-toggle helper script.
# ============================================================================

# Managed by Claude Code. Last edit 2026-05-12: IME toggle moved CapsLock-tap -> RightAlt
# (dedicated, single-function key — no tap-vs-hold misjudgement). CapsLock is now plain Ctrl.
# Rollback: sudo systemctl stop keyd  (or restore default.conf.bak.* in /etc/keyd/)

[ids]
*

[main]
# Physical LeftAlt: default (no remap).
# Physical LeftCtrl (bottom-left corner) = Windows / Super key.
# Use layer(meta) so it behaves as a real Super modifier in chords (Super+L, etc.),
# not just a one-shot key emission. keyd 2.5 warns against bare leftmeta on RHS.
leftcontrol = layer(meta)

# Physical LeftMeta(Win) = Option. Hold = opt layer; tap = super (GNOME Activities)
leftmeta = overload(opt, leftmeta)

# CapsLock = plain LeftCtrl. No tap action => no tap-vs-hold misfire.
# (Was overload(ctrl_layer, command(/usr/local/bin/fcitx5-toggle)); IME toggle moved to RightAlt.)
capslock = leftcontrol

# RightAlt = dedicated IME toggle. Single function, fires on key-down, nothing to misjudge.
# Calls the same DBus toggle script CapsLock-tap used to. us layout doesn't use AltGr anyway.
rightalt = command(/usr/local/bin/fcitx5-toggle)

# RightCtrl: plain rightcontrol (no remap)

[ctrl_layer:C]
# Kept for easy revert. Currently unreferenced now that CapsLock is plain Ctrl.
# The :C suffix means "while in this layer, auto-prefix Ctrl on every key".

[opt:A]
# Word-jump overrides:
left      = C-left
right     = C-right
backspace = C-backspace
