# tmux copy-mode 複製時送到系統剪貼簿
set -g set-clipboard on

# 加大 scrollback history
set -g history-limit 100000

# Prefix: Ctrl-b (tmux default).
# Press C-b twice to send a literal C-b to the inner program.
unbind C-a
set -g prefix C-b
bind C-b send-prefix


# tmux copy mode 不要在copy 後主動離開 
set -g @copy_mode_exit 0
bind-key -T copy-mode M-w send-keys -X copy-selection-no-clear



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fcsonline/tmux-thumbs'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


###########################
# thumns config           #
###########################

# Linux ( wl-copy)
# copy tmux buffer to wl-copy buffer (system buffer of copy paste)
#(debian) sudo apt install wl-clipboard
set -g @thumbs-command 'echo -n {} | wl-copy && tmux set-buffer -- {}'

# Match file:line patterns like interview.vue:181
set -g @thumbs-regexp-1 '[[:alnum:]_./-]+\.[[:alnum:]]+:[0-9]+'





run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux


# tmux ace jump , fenrir design : git: https://github.com/FenrirZheng/tmux-jump-rust
# Then prefix + j, type a char, pick a key. The scripts/tmux-jump.sh wrapper autodiscovers the release binary under target/.
## 提示字不要覆蓋文字
set -g @jump-keys-position 'off_left'
run-shell ~/.tmux/plugins/tmux-jump-rust/tmux-jump.tmux